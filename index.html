<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skirt Pattern Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Skirt Pattern Calculator</h1>
        <p class="description">Calculate pattern piece measurements for your custom skirt panels</p>
        
        <form id="skirt-form">
            <div class="input-group">
                <label for="waist">Waist Circumference (cm):</label>
                <input type="number" id="waist" name="waist" min="1" step="0.1" required>
            </div>
            
            <div class="input-group">
                <label for="hip">Hip Circumference (cm):</label>
                <input type="number" id="hip" name="hip" min="1" step="0.1" required>
            </div>
            
            <div class="input-group">
                <label for="length">Skirt Length (cm):</label>
                <input type="number" id="length" name="length" min="1" step="0.1" required>
            </div>
            
            <div class="input-group">
                <label for="panels">Number of Panels:</label>
                <input type="number" id="panels" name="panels" min="2" max="20" value="4" required>
            </div>
            
            <div class="input-group">
                <label for="seam-allowance">Seam Allowance (cm):</label>
                <input type="number" id="seam-allowance" name="seam-allowance" min="0" step="0.1" value="1.5">
            </div>
            
            <button type="submit">Calculate Panels</button>
        </form>
        
        <div id="results" class="results hidden">
            <h2>Panel Measurements</h2>
            <div id="panel-details"></div>
        </div>
    </div>
    
    <script src="calculator.js"></script>
</body>
</html>
